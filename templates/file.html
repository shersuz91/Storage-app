<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Summernote</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/summernote@0.9.0/dist/summernote.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/summernote@0.9.0/dist/summernote.min.js"></script>

  <style>
    * {
      padding: 0;
      margin: 0;
      box-sizing: border-box;
    }

    body {
      background-color: black;

    }

    .note-editor {
      height: 100vh;
    }

    .note-editor.note-frame.panel.panel-default {
      padding: 0 0px;
      width: 100%;
      margin: auto;
      overflow: auto;
      grid-area: main;
    }

    .panel-heading.note-toolbar {
      height: 40px;
      margin-left: auto;
      margin-right: 0;
      padding: 10px 5px;
      padding-left: 45px;
      color: #333;
      background-color: antiquewhite;
      border-color: #6a6a6a;
      box-shadow: 1px 1px 3px #333;
      position: fixed;
      width: 100%;
      bottom: 14px;
      z-index: 10;
      flex-wrap: nowrap !important;
      overflow-x: auto;
      display: none;
    }

    .note-editor .note-toolbar>.note-btn-group {
      display: flex;
      align-items: center;
    }

    .btn-group>.btn-group {
      display: flex;
    }

    .note-editable {
      padding-bottom: 100px !important;
      overflow: scroll;
      padding-top: 45px !important;
    }

    .note-statusbar {
      display: none;
    }


    .menubar {
      z-index: 100;
      height: 40px;
      width: 40px;
      display: block;
      background-color: transparent;
      border: none;
      font-size: 30px;
      left :0;
      padding: 0 !important;
    }
    .BarBox {
      right: 0px;
      top: 0px;
      background-color: #1b89e4;
      width: 100%;
      height: 40px;
      text-align: right;
      padding: 3px 3px 3px 40px ;
    }
    .BarBox .box_btn {
      display: none;
    }
    #option_list {
      grid-area: side;
      height: calc(100vh - 40px);
      position: relative;
      z-index: 90;
      
      top: 40px;
      left: 0%;
    }

    .small_screen {

      width: 50%;
      display: none;
      
    }

    .big_screen {
      display: block;
      /* height: calc(100vh); */
    }

    .bg-body-tertiary {
      width: 100% !important;
      height: 100%;
    }

    .nav>li>a,
    .nav>li>button {
      font-size: 20px;
      text-align: left;
      position: relative;
      display: block;
      padding: 10px 15px;
      width: 100%;
    }



    .modal-footer {
      display: none;
    }

    .open>.dropdown-menu {
      min-width: 100px !important;
    }

    .dropdown-menu {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
    }

    .dropdown-toggle::after {
      display: none;
    }

    
.note-editor.note-airframe.codeview .note-editing-area .note-codable, .note-editor.note-frame.codeview .note-editing-area .note-codable{
  height: calc(100vh - 40px) !important;
}
    /* // X-Small devices (portrait phones, less than 576px)
// No media query for `xs` since this is the default in Bootstrap */

    /* // Small devices (landscape phones, 576px and up) */
    @media (min-width: 576px) {}

    /* // Medium devices (tablets, 768px and up) */
    @media (min-width: 768px) {}

    /* // Large devices (desktops, 992px and up) */
    @media (min-width: 992px) {
      body {
        display: grid;
        grid-template-columns: 20% 80%;
        justify-items: stretch;
        align-items: stretch;
        grid-template-areas: "side main";
      }

      .menubar {
        display: none;
      }

    }

    /* // X-Large devices (large desktops, 1200px and up) */
    @media (min-width: 1200px) {}

    /* // XX-Large devices (larger desktops, 1400px and up) */
    @media (min-width: 1400px) {}
  </style>
</head>

<body>

  <div id="summernote" onchange="checkit(this)">
    {{file_data[2]|safe}}
  </div>
  
  <div id="option_list" class='option_list small_screen'>
    <div class="d-flex flex-column flex-shrink-0 bg-body-tertiary" style="width: 4.5rem;">
      <ul class="nav nav-pills nav-flush flex-column mb-auto text-center">
        <li class="nav-item">  </li>
        <li class="nav-item"> <button onclick="editFile(this)" class="nav-link active py-3 border-bottom rounded-0"
            aria-current="page" data-bs-toggle="tooltip" data-bs-placement="right" aria-label="Edite"
            data-bs-original-title="Edite">
            <i class="bi bi-pencil-square"></i> Edit</button> </li>
        <li> <a href="#" class="nav-link py-3 border-bottom rounded-0" data-bs-toggle="tooltip"
            data-bs-placement="right" aria-label="Delete" data-bs-original-title="Delete"> <i class="bi bi-trash"></i>
            Delete</a> </li>
        <li> <a href="#" class="nav-link py-3 border-bottom rounded-0" data-bs-toggle="tooltip"
            data-bs-placement="right" aria-label="Dashboard" data-bs-original-title="Dashboard"> <i
              class="bi bi-file-bar-graph"></i>Dashboard</a> </li>

      </ul>
      <!-- <div class="dropdown border-top"> <a href="#"
          class="d-flex align-items-center justify-content-center p-3 link-body-emphasis text-decoration-none dropdown-toggle"
          data-bs-toggle="dropdown" aria-expanded="false"> <img src="https://github.com/mdo.png" alt="mdo" width="24"
            height="24" class="rounded-circle"> </a>
        <ul class="dropdown-menu text-small shadow">
          <li><a class="dropdown-item" href="#">New project...</a></li>
          <li><a class="dropdown-item" href="#">Settings</a></li>
          <li><a class="dropdown-item" href="#">Profile</a></li>
          <li>
            <hr class="dropdown-divider">
          </li>
          <li><a class="dropdown-item" href="#">Sign out</a></li>
        </ul>
      </div> -->
    </div>
  </div>
  <div class="BarBox position-fixed d-flex align-items-center justify-content-between ">
    <button onclick="showlist(this)" class="menubar text-white position-fixed top-0 z-50 p-3 link-body-emphasis text-decoration-none"
    data-bs-toggle="tooltip" data-bs-placement="right" data-bs-original-title="Icon-only" bar_btn> <i
      class="bi bi-list"></i> </button>
    <p class="text-start py-1 px-3 m-0 border rounded fs-4 fw-bold text-white">
            {{file_data[1]}}</p>
    <div class="box_btn">
    <button class="btn btn-success" onclick="save(this)">Save</button>
    <button class="btn btn-danger" onclick="cancel(this)">Cancel</button>
</div>
  </div>
  <form id="form" action="/save" method="post">
    <input type="hidden" value="" id="file_content" name="file_content">
    <input type="hidden" value="{{file_data[0]|safe}}" id="file_id" name="file_id">
  </form>

  <script>
    // all elements are not apear till the window load all the elements
    document.body.style.display = "none"

    window.addEventListener('load', (event) => {
      // whene window load we make the body grid or blok or any other style
      document.body.style.display = "grid"
    })
// hiding the div just in case to not dublicate the contents 
    $("#summernote").hide() 
    //  run this code after HTML loaded
    $(document).ready(function () {
      // this is library from summernote for the editor tools
      $('#summernote').summernote({

        // the tooles
        toolbar:  [

          ['style', ['style', 'bold', 'italic', 'underline']],
          ['font', ['fontname', 'fontsize', 'color']],
          ['para', ['ul', 'ol']],
          ['insert', ['link', 'table', 'picture']],
          ['view', ['codeview', 'fullscreen',  'undo', 'redo', 'help']]

        ] 
      });


      var note_editable = document.querySelector(".note-editable")
      note_editable.setAttribute("contenteditable", "false")
      // var panel_heading = document.querySelector(".panel-default>.panel-heading")
      // var file_view = document.querySelector(".note-editor.note-frame.panel.panel-default")

      // var controlBtns = document.querySelectorAll(".note-editor > .note-toolbar button")
      // var dropdown_menu = document.querySelectorAll(".dropdown-menu")
      // var controlBtnsBox = document.querySelector(".note-editor > .note-toolbar")
      // document.querySelector(".panel-heading.note-toolbar").style.width="100%"

    });

// function to display the list option for mobile
    document.addEventListener("click", function (el) {
      if (window.innerWidth < 992) {
        console.log(el.target.closest(".menubar"))
        if (el.target.closest(".menubar")) {
          $(".option_list").slideToggle()

        } else {
          $(".option_list").slideUp()

        }
      }

    })

    // here we create a function to update the page while the screen size changes
    function resizeElements() {
      if (window.innerWidth < 992) {
        $(".option_list").hide()
        document.getElementById("option_list").classList.add("small_screen")
        document.getElementById("option_list").classList.remove("big_screen")
      } else {
        $(".option_list").show()
        document.getElementById("option_list").classList.remove("small_screen")
        document.getElementById("option_list").classList.add("big_screen")

      }
    }

    resizeElements()
    window.addEventListener("resize", function () {
      resizeElements()

    })

    // We created a varaible to store current content and we use it to rewrite it if we changed the content and then we pressed cancel just to prevent refresh the page
    var oldContent = ""
    function editFile(el) {
      oldContent = $('#summernote').summernote('code')
      var editorAre = document.querySelector("div[contenteditable]")
      var controler = document.querySelectorAll(".panel-heading.note-toolbar")
      editorAre.setAttribute("contenteditable", "true")
      editorAre.focus()
      controler.forEach(el => {
        el.style.display = "flex"
      })

      $(".box_btn").show()
    }

    
    function save(el) {
      oldContent = $('#summernote').summernote('code')
      var file_content = document.getElementById("file_content")
      file_content.value = oldContent
      document.getElementById("form").submit()

    }
    function cancel(el) {
      document.getElementsByClassName("note-editable")[0].innerHTML = oldContent
      $(".box_btn").hide()

      var editorAre = document.querySelector("div[contenteditable]")
      var controler = document.querySelectorAll(".panel-heading.note-toolbar")
      editorAre.setAttribute("contenteditable", "false")
      editorAre.focus()
      controler.forEach(el => {
        $(el).fadeOut()
      })
    }


  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</body>

</html>
